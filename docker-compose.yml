version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  auth-service:
    build: ./services/auth-service
    ports:
      - "5001:5001"
    env_file: ./services/auth-service/.env
    depends_on:
      - mongo

  farm-service:
    build: ./services/farm-service
    ports:
      - "5002:5002"
    env_file: ./services/farm-service/.env
    depends_on:
      - mongo

  product-service:
    build: ./services/product-service
    ports:
      - "5003:5003"
    env_file: ./services/product-service/.env
    environment:
      - ORDER_SERVICE_URL=http://order-service:5004
    depends_on:
      - mongo

  order-service:
    build: ./services/order-service
    ports:
      - "5004:5004"
    env_file: ./services/order-service/.env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:5001
      - PRODUCT_SERVICE_URL=http://product-service:5003
    depends_on:
      - mongo
      - auth-service
      - product-service

  upload-service:
    build: ./services/upload-service
    ports:
      - "5005:5005"
    env_file: ./services/upload-service/.env
    depends_on:
      - mongo

  frontend:
    build:
      context: ../Transfarmer-Frontend
      args:
        AUTH_SERVICE_URL: http://auth-service:5001
        FARM_SERVICE_URL: http://farm-service:5002
        PRODUCT_SERVICE_URL: http://product-service:5003
        ORDER_SERVICE_URL: http://order-service:5004
        UPLOAD_SERVICE_URL: http://upload-service:5005
    ports:
      - "3000:3000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:5001
      - FARM_SERVICE_URL=http://farm-service:5002
      - PRODUCT_SERVICE_URL=http://product-service:5003
      - ORDER_SERVICE_URL=http://order-service:5004
      - UPLOAD_SERVICE_URL=http://upload-service:5005
    depends_on:
      - auth-service
      - farm-service
      - product-service
      - order-service
      - upload-service

volumes:
  mongo-data: